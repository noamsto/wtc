version: 2
builds:
  - id: wtc
    main: ./cmd/wtc
    binary: wtc
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
archives:
  - name_template: "wtc_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - src: completions/wtc.fish
checksum:
  name_template: checksums.txt
